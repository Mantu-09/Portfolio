<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mantu Kumar Portfolio</title>
  <desc id="desc">Portfolio preview card showing projects, skills, and full-stack developer branding.</desc>

  <defs>
